<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q4 Seatwork1</title>
<style>
/* The asterisk is intended to make everything centered based off what it's doing to my code, hehe */ 
*{
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fff3b0, #ffd60a);
}
.card {
    background: #f4c430;
    padding: 35px 30px;
    border-radius: 30px;
    width: 340px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    color: #333;
}

h2 {
    margin-bottom: 20px;
}

label {
    display: block;
    text-align: left;
    font-size: 13px;
    margin-top: 12px;
    margin-bottom: 5px;
}

input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
    text-align: center;
    background: #fff8dc;
}

.options {
    margin-top: 10px;
    font-size: 12px;
    text-align: left;
}

.options i {
    font-size: 11px;
}

.buttons {
    margin-top: 18px;
}

button {
    padding: 10px 18px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    margin: 5px;
}

.login-btn {
    background: #ffdd00;
}

.cancel-btn {
    background: #eee;
}

.forgot {
    margin-top: 14px;
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter here">

    <label>Password</label>
    <input type="password" id="password" placeholder="********">

    <div class="options">
        <input type="checkbox"> Stay logged in <br>
    </div>

    <div class="buttons">
        <button class="login-btn" onclick="login()">Login</button>
        <button class="cancel-btn" onclick="clearFields()">Cancel</button>
    </div>

    <div class="forgot">Forgot username / password?</div>
</div>

<script>
function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (username === "SiRRenn_01" && password === "BoomShakes") {
        alert("Welcome back, SiRRenn_01!");
    } else {
        alert("Incorrect username and/or password. Try again.");
    }
}

function clearFields() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
}
</script>

</body>

</html>
